load_module /etc/nginx/modules/libngx_http_altcha_module.so;

events {}

http {
    altcha_algorithm        "PBKDF2/SHA-256";
    altcha_hmac_algorithm   sha256;
    altcha_cost             100000;
    altcha_expires          24h;

    server {
        listen 8080;

        altcha_hmac_signature_secret     "replace-me-with-a-long-random-secret";
        altcha_hmac_key_signature_secret "replace-me-with-a-different-long-random-secret";

        altcha_verify_input $cookie_altcha;

        location / {
            error_page 401 = @challenge;
            if ($altcha_verified != "1") { return 401; }

            # Replace this stub with your real site / proxy_pass / root /etc.
            default_type text/html;
            return 200 '<!doctype html><meta charset=utf-8><title>Welcome</title><h1>Welcome to the site</h1><p>You are verified.</p>';
        }

        location @challenge {
            root /path/to/your/challenge/files;
            try_files /challenge.html =404;
            default_type text/html;
            add_header Cache-Control "no-store" always;
        }

        location = /altcha/challenge {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 200 $altcha_challenge;
        }

        location = /altcha/verify {
            default_type application/json;
            if ($altcha_verified = "1") {
                return 200 '{"verified":true}';
            }
            return 403 '{"verified":false}';
        }
    }
}
